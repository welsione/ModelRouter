<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#4285f4" />
    <meta name="description" content="Your Smart Model Router" />
    <title>ModelRouter</title>
    <script>
      fetch('/static.json')
        .then(res => res.json())
        .then(data => {
          if (data.defaults) {
            if (data.defaults.name) document.title = data.defaults.name;
            if (data.defaults.description) document.querySelector('meta[name="description"]').setAttribute('content', data.defaults.description);
          }
        })
        .catch(() => {});
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#4285f4',
              secondary: '#34a853',
              accent: '#ea4335'
            }
          }
        }
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
